<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Antigravity - Smart Atlas Viewer</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: sans-serif;
            margin: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        #canvas-container {
            position: relative;
            border: 2px solid #444;
            background: linear-gradient(45deg, #222 25%, transparent 25%), linear-gradient(-45deg, #222 25%, transparent 25%), linear-gradient(45deg, #333 75%, #222 75%), linear-gradient(-45deg, #333 75%, #222 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            overflow: auto;
            max-height: 85vh;
            max-width: 70vw;
        }

        canvas {
            display: block;
        }

        .sidebar {
            flex: 1;
            max-height: 85vh;
            overflow-y: auto;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            min-width: 250px;
        }

        .info-box {
            background: #333;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
            border-left: 4px solid #007acc;
        }

        .sprite-item {
            padding: 6px;
            margin: 4px 0;
            background: #3a3a3a;
            cursor: pointer;
            border-radius: 4px;
            font-size: 13px;
        }

        .sprite-item:hover {
            background: #007acc;
            color: #fff;
        }

        h3 {
            margin-top: 0;
            color: #007acc;
        }
    </style>
</head>

<body>

    <h2>Antigravity - UI Atlas Interactive Inspector</h2>
    <div class="container">
        <div id="canvas-container">
            <canvas id="atlasCanvas"></canvas>
        </div>

        <div class="sidebar">
            <h3>Sprite Info</h3>
            <div class="info-box" id="info">Hover or click a sprite to inspect</div>
            <h3>Sprite List (519 Elements)</h3>
            <div id="list"></div>
        </div>
    </div>

    <script>
        // Update paths to match the new Asset Management Directory Architecture
        const IMAGE_SRC = 'Assets/Graphics/Spritesheets/UI.png';
        const JSON_SRC = 'Assets/Data/ui_atlas.json';

        const canvas = document.getElementById('atlasCanvas');
        const ctx = canvas.getContext('2d');
        let sprites = {};
        let img = new Image();

        // Tải file JSON tọa độ
        fetch(JSON_SRC)
            .then(response => response.json())
            .then(data => {
                sprites = data;
                img.src = IMAGE_SRC;
            })
            .catch(err => alert("Không tìm thấy file hoặc lỗi cấu trúc JSON!"));

        img.onload = function () {
            canvas.width = img.width;
            canvas.height = img.height;
            drawEverything();
            buildList();
        };

        function drawEverything(highlightKey = null) {
            // Vẽ ảnh gốc bên dưới
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            // Vẽ các khung viền bao quanh
            for (let key in sprites) {
                const sp = sprites[key];
                // TỰ ĐỘNG ĐẢO TRỤC Y TỪ UNITY SANG CHUẨN WEB/SFML
                const sfmlY = img.height - sp.y - sp.height;

                if (key === highlightKey) {
                    ctx.strokeStyle = '#ff0055';
                    ctx.lineWidth = 2;
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.25)';
                    ctx.fillRect(sp.x, sfmlY, sp.width, sp.height);
                } else {
                    ctx.strokeStyle = 'rgba(0, 122, 204, 0.5)';
                    ctx.lineWidth = 1;
                }
                ctx.strokeRect(sp.x, sfmlY, sp.width, sp.height);
            }
        }

        function buildList() {
            const listDiv = document.getElementById('list');
            Object.keys(sprites).sort().forEach(key => {
                const div = document.createElement('div');
                div.className = 'sprite-item';
                div.innerText = key;
                div.onmouseenter = () => updateSelection(key);
                listDiv.appendChild(div);
            });
        }

        function updateSelection(key) {
            if (!sprites[key]) return;
            const sp = sprites[key];
            document.getElementById('info').innerHTML = `
                <strong>Name:</strong> ${key}<br>
                <strong>Unity X, Y:</strong> ${sp.x}, ${sp.y}<br>
                <strong>SFML X, Y:</strong> ${sp.x}, ${img.height - sp.y - sp.height}<br>
                <strong>Size:</strong> ${sp.width} x ${sp.height}
            `;
            drawEverything(key);
        }

        // Bắt sự kiện di chuột trên Canvas để check tọa độ ngược
        canvas.onmousemove = function (e) {
            const rect = canvas.getBoundingClientRect();
            // Tính toán tỷ lệ chuẩn khi canvas bị scale trên UI
            const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
            const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let key in sprites) {
                const sp = sprites[key];
                const sfmlY = img.height - sp.y - sp.height;

                if (mouseX >= sp.x && mouseX <= sp.x + sp.width &&
                    mouseY >= sfmlY && mouseY <= sfmlY + sp.height) {
                    updateSelection(key);
                    break;
                }
            }
        };
    </script>
</body>

</html>
